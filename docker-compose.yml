services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pdf_translator_backend
    ports:
      - "8000:8000"
    volumes:
      # Mount các thư mục upload, output và file SQLite DB để dữ liệu không bị mất khi restart container
      - ./upload:/app/upload
      - ./output:/app/output
      - ./pdf_translator.db:/app/pdf_translator.db
    env_file:
      - .env
    restart: always

  frontend:
    build:
      context: "../pdf converter FE"
      dockerfile: Dockerfile
      args:
        # Sử dụng đường dẫn tương đối qua Nginx proxy để không cần hardcode IP khi deploy
        - VITE_API_URL=/api
    container_name: pdf_translator_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: always

  nginx:
    image: nginx:alpine
    container_name: pdf_translator_gateway
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    restart: always
